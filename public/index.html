<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | SocialApp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <form id="loginForm" class="card">
            <h2>Welcome back</h2>
            <input type="text" id="user" placeholder="Username" required>
            <input type="password" id="pass" placeholder="Password" required>
            <button type="submit" class="btn-primary">Login</button>
            <p style="text-align: center; margin-top: 1rem; font-size: 0.9rem; color: #6b7280;">
                New here? <a href="register.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">Create account</a>
            </p>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
