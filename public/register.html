<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Join Us | SocialApp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <form id="registerForm" class="card">
            <h2>Create Account</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;">
                <input type="text" id="fName" placeholder="First Name" required>
                <input type="text" id="lName" placeholder="Last Name" required>
            </div>
            <input type="number" id="age" placeholder="Age" required>
            <input type="text" id="user" placeholder="Username" required>
            <input type="password" id="pass" placeholder="Password" required>
            <button type="submit" class="btn-primary">Sign Up</button>
            <p style="text-align: center; margin-top: 1rem; font-size: 0.9rem; color: #6b7280;">
                Already have an account? <a href="index.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">Login</a>
            </p>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
